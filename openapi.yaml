openapi: 3.0.3

info:
  title: nodejs-api
  version: 1.0.0
  description: >
    A RESTful Node.js API providing user authentication, user profile management,
    and blog post CRUD operations. Authentication is performed via JWT Bearer tokens.
    Passwords are hashed with bcrypt. The API uses an in-memory store; data does not
    persist across server restarts.

servers:
  - url: /

paths:

  # ──────────────────────────────────────────────
  # Auth
  # ──────────────────────────────────────────────
  /api/auth/register:
    post:
      summary: Register a new user account
      operationId: registerUser
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User successfully registered
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthData'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email address is already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/login:
    post:
      summary: Authenticate a user and obtain a JWT
      operationId: loginUser
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthData'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ──────────────────────────────────────────────
  # Users
  # ──────────────────────────────────────────────
  /api/users:
    get:
      summary: List all users
      operationId: listUsers
      tags:
        - users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/users/{id}:
    get:
      summary: Get a user by ID
      operationId: getUserById
      tags:
        - users
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: User retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      summary: Update a user's profile (self only)
      operationId: updateUser
      tags:
        - users
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete a user account (self only)
      operationId: deleteUser
      tags:
        - users
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        nullable: true
                        example: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ──────────────────────────────────────────────
  # Posts
  # ──────────────────────────────────────────────
  /api/posts:
    get:
      summary: List all posts
      operationId: listPosts
      tags:
        - posts
      responses:
        '200':
          description: Posts retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Post'

    post:
      summary: Create a new post
      operationId: createPost
      tags:
        - posts
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '201':
          description: Post created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/posts/{id}:
    get:
      summary: Get a post by ID
      operationId: getPostById
      tags:
        - posts
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Post retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Post'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      summary: Update a post (author only)
      operationId: updatePost
      tags:
        - posts
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePostRequest'
      responses:
        '200':
          description: Post updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete a post (author only)
      operationId: deletePost
      tags:
        - posts
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Post deleted successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        nullable: true
                        example: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

# ──────────────────────────────────────────────
# Components
# ──────────────────────────────────────────────
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT issued by POST /api/auth/login or POST /api/auth/register.
        Pass as: Authorization: Bearer <token>

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: Unique string identifier of the resource
      schema:
        type: string
        example: "1"

  schemas:

    User:
      type: object
      description: A user account (password field is never returned)
      properties:
        id:
          type: string
          example: "1"
        email:
          type: string
          format: email
          example: alice@example.com
        name:
          type: string
          example: Alice Smith
        createdAt:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00.000Z"
      required:
        - id
        - email
        - name
        - createdAt

    Post:
      type: object
      description: A blog post
      properties:
        id:
          type: string
          example: "1"
        title:
          type: string
          example: My First Post
        content:
          type: string
          example: This is the body of the post.
        authorId:
          type: string
          example: "1"
        createdAt:
          type: string
          format: date-time
          example: "2024-01-15T11:00:00.000Z"
      required:
        - id
        - title
        - content
        - authorId
        - createdAt

    AuthData:
      type: object
      description: Payload returned on successful registration or login
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
          description: JWT bearer token; valid for 1 day
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjEiLCJlbWFpbCI6ImFsaWNlQGV4YW1wbGUuY29tIn0.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c
      required:
        - user
        - token

    SuccessEnvelope:
      type: object
      description: Standard success response wrapper
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Success
        data:
          description: Response payload; shape varies by endpoint
      required:
        - success
        - message

    ErrorResponse:
      type: object
      description: Standard error response
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: An error occurred
      required:
        - success
        - message

    RegisterRequest:
      type: object
      description: Payload for registering a new user
      properties:
        email:
          type: string
          format: email
          example: alice@example.com
        password:
          type: string
          minLength: 6
          example: secret123
        name:
          type: string
          example: Alice Smith
      required:
        - email
        - password

    LoginRequest:
      type: object
      description: Payload for authenticating a user
      properties:
        email:
          type: string
          format: email
          example: alice@example.com
        password:
          type: string
          minLength: 6
          example: secret123
      required:
        - email
        - password

    UpdateUserRequest:
      type: object
      description: Fields that can be updated on a user profile (at least one required)
      properties:
        name:
          type: string
          example: Alice Jones
        email:
          type: string
          format: email
          example: alice.jones@example.com

    CreatePostRequest:
      type: object
      description: Payload for creating a new post
      properties:
        title:
          type: string
          example: My New Post
        content:
          type: string
          example: Here is the content of my post.
      required:
        - title
        - content

    UpdatePostRequest:
      type: object
      description: Fields that can be updated on a post (at least one required)
      properties:
        title:
          type: string
          example: Updated Post Title
        content:
          type: string
          example: Updated post content.

  responses:
    BadRequest:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Email and password are required

    Unauthorized:
      description: Missing or invalid JWT token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: No token provided

    Forbidden:
      description: Authenticated user does not have permission for this resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Forbidden

    NotFound:
      description: Requested resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: User not found
